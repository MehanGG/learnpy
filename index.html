<!DOCTYPE html>
<html>
<head>
<title>PythonMaster</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{display:flex;background:#0f172a;color:white;height:100vh}
.sidebar{
width:260px;
background:#111827;
padding:20px;
overflow:auto;
}
.sidebar h2{margin-bottom:20px}
.sidebar button{
width:100%;
padding:10px;
margin:5px 0;
background:#1f2937;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
text-align:left;
}
.sidebar button:hover{background:#3b82f6}
.main{
flex:1;
padding:30px;
overflow:auto;
}
.card{
background:#111827;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}
.open-editor{
background:linear-gradient(90deg,#06b6d4,#3b82f6);
padding:10px 20px;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}
</style>
</head>
<body>

<div class="sidebar">
<h2>PythonMaster</h2>

<button onclick="loadLesson(0)">1. Print</button>
<button onclick="loadLesson(1)">2. Variable</button>
<button onclick="loadLesson(2)">3. If Else</button>
<button onclick="loadLesson(3)">4. Loop</button>
<button onclick="loadLesson(4)">5. Function</button>
<button onclick="location.href='testpy.html'">🐍 Buka Python Editor</button>

</div>

<div class="main">
<h1>Materi Python</h1>
<div id="content"></div>
</div>

<script>
const lessons=[
{
title:"Print",
content:`print() digunakan untuk menampilkan output.
Contoh:
print("Halo Dunia")

Latihan:
Cetak nama kamu ke layar.`
},
{
title:"Variable",
content:`Variable menyimpan data.
x=10
nama="Budi"

Python otomatis menentukan tipe data.`
},
{
title:"If Else",
content:`If digunakan untuk kondisi.
if x>5:
 print("Besar")
else:
 print("Kecil")`
},
{
title:"Loop",
content:`For dan While untuk perulangan.
for i in range(5):
 print(i)`
},
{
title:"Function",
content:`Function dibuat dengan def.
def halo():
 print("Hi")`
}
];

function loadLesson(i){
content.innerHTML=`
<div class="card">
<h2>${lessons[i].title}</h2>
<pre>${lessons[i].content}</pre>
</div>`;
}
</script>

</body>
</html>
