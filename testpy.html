<!DOCTYPE html>
<html>
<head>
<title>Python Test</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
<style>
body{background:#0f172a;color:white;font-family:Arial;padding:20px}
textarea{width:100%;height:200px;background:#1e293b;color:white;padding:10px}
button{padding:10px;background:#3b82f6;border:none;color:white;margin:5px}
pre{background:#1e293b;padding:10px}
</style>
</head>
<body>

<h1>Python TEST</h1>

<textarea id="code">print("Hello LearnPy")</textarea>
<br>
<button onclick="run()">Run</button>
<button onclick="clearCode()">Clear</button>

<h3>Output:</h3>
<pre id="output"></pre>

<script>
let pyodideReadyPromise = loadPyodide();

async function run(){
let pyodide = await pyodideReadyPromise;
let code=document.getElementById("code").value;
try{
let result=await pyodide.runPythonAsync(code);
output.textContent=result ?? "";
}catch(err){
output.textContent="Error:\n"+err;
}
}

function clearCode(){
code.value="";
output.textContent="";
}
</script>

</body>
</html>
