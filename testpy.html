<!DOCTYPE html>
<html>
<head>
<title>Python Editor</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{background:#0f172a;color:white;padding:20px}
.editor{
background:#111827;
border-radius:15px;
padding:15px;
}
textarea{
width:100%;
height:250px;
background:#1f2937;
color:white;
border:none;
padding:15px;
border-radius:10px;
}
button{
padding:10px 20px;
margin:10px 5px 0 0;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#06b6d4,#3b82f6);
color:white;
cursor:pointer;
}
pre{
background:#1f2937;
padding:15px;
border-radius:10px;
margin-top:10px;
}
</style>
</head>
<body>

<h1>Python Editor</h1>

<div class="editor">
<textarea id="code">print("Halo Dunia!")</textarea>
<br>
<button onclick="run()">Run Code</button>
<button onclick="clearCode()">Clear</button>
<pre id="output"></pre>
</div>

<script>
let pyodideReadyPromise = loadPyodide();

async function run(){
let pyodide = await pyodideReadyPromise;
try{
let result = await pyodide.runPythonAsync(code.value);
output.textContent = result ?? "";
}catch(err){
output.textContent="Error:\n"+err;
}
}

function clearCode(){
code.value="";
output.textContent="";
}
</script>

</body>
</html>
